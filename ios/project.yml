name: SimpleReader
options:
  bundleIdPrefix: com.dysun
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  ReadiumShared:
    url: https://github.com/readium/swift-toolkit.git
    from: 3.6.0

targets:
  SimpleReader:
    type: application
    platform: iOS
    sources:
      - SimpleReader
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dysun.simplereader
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 12
        DEVELOPMENT_TEAM: 65H9JV933T
        INFOPLIST_FILE: SimpleReader/Resources/Info.plist
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_STRICT_CONCURRENCY: minimal
    dependencies:
      - package: ReadiumShared
        product: ReadiumShared
      - package: ReadiumShared
        product: ReadiumStreamer
      - package: ReadiumShared
        product: ReadiumNavigator
      - package: ReadiumShared
        product: ReadiumAdapterGCDWebServer

schemes:
  SimpleReader:
    build:
      targets:
        SimpleReader: all
